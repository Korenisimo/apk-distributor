name: Build APK & Upload to Distributor

on:
  workflow_call:
    inputs:
      app-slug:
        description: 'Unique slug for this app (e.g., "hod-travel"). Must be URL-safe.'
        required: true
        type: string
      app-name:
        description: 'Human-readable app name (e.g., "HOD Travel Journal")'
        required: true
        type: string
      working-directory:
        description: 'Subdirectory to run npm ci and build in (default: repo root)'
        required: false
        type: string
        default: '.'
      build-command:
        description: 'Command to produce the APK. Must output a file at apk-path.'
        required: false
        type: string
        default: 'npx eas-cli build --platform android --profile preview --local --output ./app.apk --non-interactive'
      apk-path:
        description: 'Path to the built APK file'
        required: false
        type: string
        default: './app.apk'
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      java-version:
        description: 'Java version (for Android SDK)'
        required: false
        type: string
        default: '17'
    secrets:
      EXPO_TOKEN:
        required: false
      R2_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_BUCKET_NAME:
        required: true
      DISTRIBUTOR_WEBHOOK_SECRET:
        required: true
      DISTRIBUTOR_WEBHOOK_URL:
        required: true
      MOBILE_API_KEY:
        description: 'API key baked into the mobile app build (EXPO_PUBLIC_MOBILE_API_KEY)'
        required: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify build started
        run: |
          curl -s -X POST "${{ secrets.DISTRIBUTOR_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.DISTRIBUTOR_WEBHOOK_SECRET }}" \
            -d '{
              "event": "build_started",
              "app": {
                "slug": "${{ inputs.app-slug }}",
                "name": "${{ inputs.app-name }}",
                "repo": "${{ github.repository }}",
                "sha": "${{ github.sha }}",
                "runId": ${{ github.run_id }},
                "runNumber": ${{ github.run_number }},
                "ref": "${{ github.ref_name }}",
                "triggeredBy": "${{ github.actor }}",
                "startedAt": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              }
            }' || echo "⚠️ Failed to notify build started (non-fatal)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Java (Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Cache EAS local build
        uses: actions/cache@v4
        with:
          path: |
            ~/.expo
            android/.gradle
            android/app/build
          key: eas-local-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/eas.json', '**/app.json') }}
          restore-keys: |
            eas-local-${{ runner.os }}-

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Build APK
        id: build
        run: ${{ inputs.build-command }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_MOBILE_API_KEY: ${{ secrets.MOBILE_API_KEY }}

      - name: Verify APK exists and is valid
        id: verify
        run: |
          APK="${{ inputs.apk-path }}"

          # 1. File must exist
          if [ ! -f "$APK" ]; then
            echo "❌ APK not found at $APK"
            exit 1
          fi

          SIZE=$(du -h "$APK" | cut -f1)
          echo "✅ APK found: $SIZE"

          # 2. Must be a valid ZIP (APKs are ZIPs)
          if ! unzip -t "$APK" > /dev/null 2>&1; then
            echo "❌ APK is not a valid ZIP — file is corrupted"
            exit 1
          fi

          # 3. Dump manifest with aapt to verify it's a real APK and log minSdkVersion
          AAPT=$(find $ANDROID_HOME/build-tools -name "aapt" | sort -V | tail -1)
          if [ -n "$AAPT" ]; then
            echo "--- APK manifest dump ---"
            $AAPT dump badging "$APK" | grep -E "package|sdkVersion|native-code|uses-permission" || true
            echo "-------------------------"

            MIN_SDK=$($AAPT dump badging "$APK" | grep "sdkVersion" | grep -oP "minSdkVersion:'\K[0-9]+" || echo "unknown")
            TARGET_SDK=$($AAPT dump badging "$APK" | grep "sdkVersion" | grep -oP "targetSdkVersion:'\K[0-9]+" || echo "unknown")
            echo "📱 minSdkVersion: $MIN_SDK (Android $(awk "BEGIN{if($MIN_SDK>=35)print 15;else if($MIN_SDK>=34)print 14;else if($MIN_SDK>=33)print 13;else if($MIN_SDK>=32)print 12;else if($MIN_SDK>=30)print 11;else if($MIN_SDK>=29)print 10;else if($MIN_SDK>=28)print 9;else if($MIN_SDK>=26)print 8;else if($MIN_SDK>=24)print 7;else if($MIN_SDK>=23)print 6;else print \"<6\"}" 2>/dev/null || echo "?"))"
            echo "🎯 targetSdkVersion: $TARGET_SDK"

            if [ "$MIN_SDK" != "unknown" ] && [ "$MIN_SDK" -gt 24 ]; then
              echo "⚠️  WARNING: minSdkVersion $MIN_SDK is higher than 24 — devices on Android 7 or lower cannot install this APK"
            fi
          else
            echo "⚠️  aapt not found — skipping manifest verification"
          fi

      - name: Upload to R2 & notify distributor
        id: upload
        run: |
          npm install --no-save @aws-sdk/client-s3
          node -e '
          const { S3Client, PutObjectCommand } = require("@aws-sdk/client-s3");
          const fs = require("fs");

          const client = new S3Client({
            region: "auto",
            endpoint: `https://${process.env.R2_ACCOUNT_ID}.r2.cloudflarestorage.com`,
            credentials: {
              accessKeyId: process.env.R2_ACCESS_KEY_ID,
              secretAccessKey: process.env.R2_SECRET_ACCESS_KEY,
            },
          });

          const apk = fs.readFileSync(process.env.APK_PATH);
          const slug = process.env.APP_SLUG;
          const bucket = process.env.R2_BUCKET_NAME;

          let version = "unknown";
          try {
            const pkg = JSON.parse(fs.readFileSync("./package.json", "utf8"));
            version = pkg.version || "unknown";
          } catch {}

          const runNumber = parseInt(process.env.GITHUB_RUN_NUMBER, 10);
          const runId = process.env.GITHUB_RUN_ID;
          const repo = process.env.GITHUB_REPOSITORY;
          const actionsUrl = `https://github.com/${repo}/actions/runs/${runId}`;

          const metadata = {
            slug,
            name: process.env.APP_NAME,
            version,
            buildDate: new Date().toISOString(),
            sha: process.env.GITHUB_SHA,
            size: apk.length,
            repo,
            buildNumber: runNumber,
          };

          (async () => {
            console.log(`⬆️  Uploading ${slug} v${version} (${(apk.length / 1024 / 1024).toFixed(1)} MB)...`);

            await client.send(new PutObjectCommand({
              Bucket: bucket,
              Key: `apps/${slug}/latest.apk`,
              Body: apk,
              ContentType: "application/vnd.android.package-archive",
            }));
            console.log("✅ APK uploaded");

            await client.send(new PutObjectCommand({
              Bucket: bucket,
              Key: `apps/${slug}/latest.json`,
              Body: JSON.stringify(metadata, null, 2),
              ContentType: "application/json",
            }));
            console.log("✅ Metadata uploaded");

            // Notify distributor dashboard
            try {
              const res = await fetch(process.env.DISTRIBUTOR_WEBHOOK_URL, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "X-Webhook-Secret": process.env.DISTRIBUTOR_WEBHOOK_SECRET,
                },
                body: JSON.stringify({
                  event: "build_complete",
                  app: {
                    ...metadata,
                    runId: parseInt(runId, 10),
                    runNumber,
                    ref: process.env.GITHUB_REF_NAME,
                    triggeredBy: process.env.GITHUB_ACTOR,
                    actionsUrl,
                  },
                }),
              });
              console.log(`✅ Webhook notified (${res.status})`);
            } catch (err) {
              console.warn("⚠️  Webhook notification failed (non-fatal):", err.message);
            }

            console.log(`\n🎉 Done! ${slug} v${version} is live.`);
          })();
          '
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISTRIBUTOR_WEBHOOK_SECRET: ${{ secrets.DISTRIBUTOR_WEBHOOK_SECRET }}
          DISTRIBUTOR_WEBHOOK_URL: ${{ secrets.DISTRIBUTOR_WEBHOOK_URL }}
          APP_SLUG: ${{ inputs.app-slug }}
          APP_NAME: ${{ inputs.app-name }}
          APK_PATH: ${{ inputs.apk-path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Notify build failed
        if: failure()
        run: |
          # Determine which step failed
          FAILED_STEP="unknown"
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            FAILED_STEP="Build APK"
          elif [ "${{ steps.install.outcome }}" = "failure" ]; then
            FAILED_STEP="Install dependencies"
          elif [ "${{ steps.verify.outcome }}" = "failure" ]; then
            FAILED_STEP="Verify APK"
          elif [ "${{ steps.upload.outcome }}" = "failure" ]; then
            FAILED_STEP="Upload to R2"
          fi

          curl -s -X POST "${{ secrets.DISTRIBUTOR_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.DISTRIBUTOR_WEBHOOK_SECRET }}" \
            -d '{
              "event": "build_failed",
              "app": {
                "slug": "${{ inputs.app-slug }}",
                "name": "${{ inputs.app-name }}",
                "repo": "${{ github.repository }}",
                "sha": "${{ github.sha }}",
                "runId": ${{ github.run_id }},
                "runNumber": ${{ github.run_number }},
                "ref": "${{ github.ref_name }}",
                "triggeredBy": "${{ github.actor }}",
                "failedAt": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'",
                "failedStep": "'"${FAILED_STEP}"'",
                "actionsUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            }' || echo "⚠️ Failed to notify build failure (non-fatal)"
